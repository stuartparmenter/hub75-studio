# DDP Stream Page
# Video streaming via DDP protocol
#
# Required vars:
#   page_friendly_name: Name of the page (e.g., Video Stream)
#   back_buffers: Number of back buffers (0-2)
#   default_video_src: Default video source URL or file path

lvgl_page_manager:
  pages:
    - page: ddp_video
      friendly_name: "${page_friendly_name}"

# UDP DDP sink + canvas bindings (no w/h required here)
ddp_canvas:
  - id: stream_video
    canvas: video_canvas
    back_buffers: ${back_buffers}

# -----------------------------
# WebSocket control
# -----------------------------
media_proxy_control:
  id: mp_control
  outputs:
    - id: output_video
      stream: stream_video
      src: ${default_video_src}
      format: rgb565
      loop: true

# -----------------------------
# LVGL page with a single canvas
# -----------------------------
lvgl:
  pages:
    - id: ddp_video
      widgets:
        - canvas:
            id: video_canvas
            width: ${DISPLAY_W}
            height: ${DISPLAY_H}
      on_load:
        then:
          - lambda: |-
              id(output_video).start();
      on_unload:
        then:
          - lambda: |-
              id(output_video).stop();
              lv_canvas_fill_bg(id(video_canvas), lv_color_black(), LV_OPA_COVER);

# -----------------------------
# Auto-switch page when source changes
# -----------------------------
switch:
  - platform: template
    id: video_src_auto_switch_page
    name: "Auto-switch to ${page_friendly_name} on source change"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

# -----------------------------
# Runtime source change
# -----------------------------
text:
  - platform: template
    id: video_src_ctl
    name: "Media Source"
    optimistic: true
    initial_value: ${default_video_src}
    mode: text
    min_length: 4
    max_length: 255
    restore_value: true
    on_value:
      then:
        - media_proxy_control.set_source:
            id: output_video
            src: !lambda "return x;"
        # Only jump to the stream page on real runtime changes (API connected),
        # not on boot-time replays of the restored value.
        - if:
            condition:
              and:
                - switch.is_on: video_src_auto_switch_page
                - lambda: 'return api::global_api_server != nullptr && api::global_api_server->is_connected();'
            then:
              - lvgl_page_manager.page.show:
                  page: ddp_video